<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-white dark:bg-gray-900 min-h-screen p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Dark Mode Test</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-6">If you see white text on dark background, dark mode is working!</p>
        
        <button 
            onclick="document.documentElement.classList.toggle('dark')"
            class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
        >
            Toggle Dark Mode
        </button>
        
        <div class="mt-6 p-4 bg-gray-100 dark:bg-gray-800 rounded-lg">
            <p class="text-gray-900 dark:text-white">This box should change color too!</p>
        </div>
    </div>
</body>
</html>
